<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Autopilot YouTube channel field report illustration</title>
  <desc id="desc">A minimal editorial illustration showing a YouTube play symbol, a production pipeline, and experiment metrics for an automated channel.</desc>
  <defs>
    <linearGradient id="inkLine" x1="233" y1="501" x2="1317" y2="501" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BB4332"/>
      <stop offset="1" stop-color="#D26C46"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="#F5EEE2"/>
  <rect x="104" y="96" width="1392" height="708" rx="18" stroke="#C8B59C" stroke-width="2"/>
  <path d="M134 162H1466" stroke="#C8B59C" stroke-width="2"/>
  <path d="M134 258H1466" stroke="#E0D0BC" stroke-width="1.5" stroke-dasharray="3 8"/>
  <path d="M134 640H1466" stroke="#E0D0BC" stroke-width="1.5" stroke-dasharray="3 8"/>

  <text x="156" y="144" fill="#6A6057" font-family="IBM Plex Mono, Menlo, monospace" font-size="22" letter-spacing="3.4">FIELD REPORT // AUTOPILOT CHANNEL EXPERIMENT</text>
  <text x="156" y="224" fill="#1D1A17" font-family="Cormorant Garamond, Times New Roman, serif" font-size="94" font-weight="700">Running a YouTube Channel</text>
  <text x="156" y="302" fill="#1D1A17" font-family="Cormorant Garamond, Times New Roman, serif" font-size="94" font-weight="700">on Autopilot</text>
  <text x="159" y="352" fill="#665C53" font-family="Libre Baskerville, Georgia, serif" font-size="28">The system worked. The harder question was whether the channel strategy deserved to scale.</text>

  <path d="M1118 382L1244 456L1118 530V382Z" fill="#BB4332" fill-opacity="0.12" stroke="#BB4332" stroke-width="4"/>
  <path d="M1162 410L1212 456L1162 502V410Z" fill="#BB4332"/>

  <path d="M256 564H360L448 516L552 582L672 462L804 510L926 446L1046 492L1156 448L1318 494" stroke="url(#inkLine)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="448" cy="516" r="10" fill="#BB4332"/>
  <circle cx="672" cy="462" r="10" fill="#BB4332"/>
  <circle cx="926" cy="446" r="10" fill="#0D6E88"/>
  <circle cx="1156" cy="448" r="10" fill="#1D1A17"/>

  <text x="154" y="430" fill="#6A6057" font-family="IBM Plex Mono, Menlo, monospace" font-size="18" letter-spacing="2.2">02 MONTHS</text>
  <text x="154" y="478" fill="#1D1A17" font-family="Space Grotesk, Arial, sans-serif" font-size="54" font-weight="700">0 → ~300</text>
  <text x="154" y="514" fill="#6A6057" font-family="Libre Baskerville, Georgia, serif" font-size="22">subscribers on a new channel</text>

  <text x="534" y="616" fill="#6A6057" font-family="IBM Plex Mono, Menlo, monospace" font-size="18" letter-spacing="2.2">COST</text>
  <text x="534" y="666" fill="#1D1A17" font-family="Space Grotesk, Arial, sans-serif" font-size="54" font-weight="700">$250</text>

  <text x="834" y="616" fill="#6A6057" font-family="IBM Plex Mono, Menlo, monospace" font-size="18" letter-spacing="2.2">WATCH-TIME SIGNAL</text>
  <text x="834" y="666" fill="#1D1A17" font-family="Space Grotesk, Arial, sans-serif" font-size="54" font-weight="700">~100 hrs</text>

  <text x="1166" y="616" fill="#6A6057" font-family="IBM Plex Mono, Menlo, monospace" font-size="18" letter-spacing="2.2">TAKEAWAY</text>
  <text x="1166" y="666" fill="#1D1A17" font-family="Space Grotesk, Arial, sans-serif" font-size="46" font-weight="700">Niche wins</text>

  <text x="156" y="736" fill="#6A6057" font-family="IBM Plex Mono, Menlo, monospace" font-size="18" letter-spacing="2.2">PIPELINE</text>
  <text x="156" y="782" fill="#1D1A17" font-family="IBM Plex Mono, Menlo, monospace" font-size="28">SCRAPE</text>
  <text x="370" y="782" fill="#1D1A17" font-family="IBM Plex Mono, Menlo, monospace" font-size="28">RANK</text>
  <text x="562" y="782" fill="#1D1A17" font-family="IBM Plex Mono, Menlo, monospace" font-size="28">SCRIPT</text>
  <text x="794" y="782" fill="#1D1A17" font-family="IBM Plex Mono, Menlo, monospace" font-size="28">VISUALS</text>
  <text x="1046" y="782" fill="#1D1A17" font-family="IBM Plex Mono, Menlo, monospace" font-size="28">POLICY</text>
  <text x="1270" y="782" fill="#1D1A17" font-family="IBM Plex Mono, Menlo, monospace" font-size="28">PUBLISH</text>

  <path d="M290 768H336" stroke="#BB4332" stroke-width="3" stroke-linecap="round"/>
  <path d="M488 768H534" stroke="#BB4332" stroke-width="3" stroke-linecap="round"/>
  <path d="M712 768H758" stroke="#BB4332" stroke-width="3" stroke-linecap="round"/>
  <path d="M970 768H1016" stroke="#BB4332" stroke-width="3" stroke-linecap="round"/>
  <path d="M1210 768H1256" stroke="#BB4332" stroke-width="3" stroke-linecap="round"/>
</svg>
